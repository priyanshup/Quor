name: Canary — Claude Code Compatibility

# Runs weekly to catch Anthropic changing the Claude Code hook format before
# users do. Also triggerable manually for immediate spot-checks.

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    name: Hook compatibility — Claude Code latest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js (for Claude Code)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Claude Code (latest, unpinned)
        # Not pinned intentionally — the canary exists to catch Anthropic
        # changing hook format in a new release before our users hit it.
        run: npm install -g @anthropic-ai/claude-code

      - name: Record Claude Code version
        run: |
          echo "## Claude Code version" >> $GITHUB_STEP_SUMMARY
          npm ls -g @anthropic-ai/claude-code --json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.get('dependencies',{}).values())[0].get('version','unknown'))" \
            || echo "version unavailable" >> $GITHUB_STEP_SUMMARY

      - name: Install Quor from source
        run: pip install -e ".[dev]"

      - name: Install test plugin fixture
        run: pip install -e ./tests/fixtures/test_plugin

      - name: Verify hook responds to current Claude Code PreToolUse format
        # Send the JSON format Claude Code actually sends via PreToolUse hook,
        # verify the response is valid JSON with the expected command rewrite
        # nested under hookSpecificOutput.updatedInput (ADR-030) — Claude Code
        # ignores a bare top-level tool_input echo entirely, so that shape
        # must never reappear here even though it looks plausible in isolation.
        run: |
          PAYLOAD='{"tool_name":"Bash","tool_input":{"command":"git status"}}'
          RESULT=$(echo "$PAYLOAD" | python -m quor hook claude)
          echo "Hook response: $RESULT"

          # Verify: response is valid JSON and command is rewritten
          # RESULT is passed via env var, not piped to stdin — a pipe here would
          # collide with the heredoc below, which already occupies python3's
          # stdin to deliver the script itself (bash resolves that conflict by
          # giving the heredoc control of stdin, silently discarding the pipe,
          # so json.load(sys.stdin) would always see an empty string).
          RESULT="$RESULT" python3 - <<'EOF'
          import json, os, sys
          try:
              d = json.loads(os.environ["RESULT"])
          except json.JSONDecodeError as e:
              print(f"FAIL: hook response is not valid JSON: {e}", file=sys.stderr)
              sys.exit(1)
          if "tool_input" in d or "tool_name" in d:
              print(
                  f"FAIL: response echoes a top-level tool_input/tool_name field "
                  f"(ADR-030 regression — Claude Code ignores this), got {d!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          hso = d.get("hookSpecificOutput")
          if hso is None:
              print(f"FAIL: response missing hookSpecificOutput entirely, got {d!r}", file=sys.stderr)
              sys.exit(1)
          if hso.get("hookEventName") != "PreToolUse":
              print(f"FAIL: hookSpecificOutput.hookEventName != 'PreToolUse', got {hso.get('hookEventName')!r}", file=sys.stderr)
              sys.exit(1)
          cmd = hso.get("updatedInput", {}).get("command", "")
          if "-m quor git status" not in cmd:
              print(f"FAIL: expected '-m quor git status' in command, got {cmd!r}", file=sys.stderr)
              sys.exit(1)
          if cmd.startswith("quor "):
              print(
                  f"FAIL: rewritten command still uses the bare 'quor' launcher "
                  f"instead of the interpreter (ADR-029), got {cmd!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"OK: command rewritten to {cmd!r}")
          EOF

      - name: Verify hook preserves sibling tool_input fields in updatedInput
        # updatedInput replaces the whole tool_input object, not just "command",
        # so fields Claude Code sets alongside it (e.g. "description") must
        # survive the rewrite. (Top-level fields like session_id are not part
        # of the PreToolUse response contract at all — Claude Code only reads
        # hookSpecificOutput — so they are correctly not echoed back.)
        run: |
          PAYLOAD='{"tool_name":"Bash","tool_input":{"command":"git status","description":"check repo state"}}'
          RESULT=$(echo "$PAYLOAD" | python -m quor hook claude)
          echo "Hook response: $RESULT"
          RESULT="$RESULT" python3 - <<'EOF'
          import json, os, sys
          d = json.loads(os.environ["RESULT"])
          updated = d.get("hookSpecificOutput", {}).get("updatedInput", {})
          if updated.get("description") != "check repo state":
              print(f"FAIL: sibling tool_input field 'description' was dropped, got {updated!r}", file=sys.stderr)
              sys.exit(1)
          if "-m quor git status" not in updated.get("command", ""):
              print(f"FAIL: expected rewritten command in updatedInput, got {updated!r}", file=sys.stderr)
              sys.exit(1)
          print("OK: sibling tool_input fields preserved in updatedInput")
          EOF

      - name: Verify quor init --claude writes valid settings.json
        run: |
          mkdir -p /tmp/canary-claude
          python -m quor init --claude --yes --settings-path /tmp/canary-claude/settings.json
          python3 -c "
          import json, sys
          with open('/tmp/canary-claude/settings.json') as f:
              d = json.load(f)
          hooks = d.get('hooks', {}).get('PreToolUse', [])
          if not any('claude-hook.ps1' in str(h) for entry in hooks for h in entry.get('hooks', [])):
              print('FAIL: hook not found in settings.json', file=sys.stderr)
              sys.exit(1)
          print('OK: hook registered in settings.json')
          "

      - name: Run full test suite
        # The canary also proves Quor's test suite passes against the latest
        # Claude Code version (package installed above).
        run: pytest tests/ -q --tb=short -x
