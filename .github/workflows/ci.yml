name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Install test plugin fixture
        run: pip install -e ./tests/fixtures/test_plugin

      - name: Lint — ruff
        run: ruff check quor/ tests/

      - name: Type check — mypy
        run: mypy quor/

      - name: Tests
        run: pytest tests/ --cov=quor --cov-report=term-missing

      - name: Integration tests (real subprocess/filesystem, excluded from the default run above)
        run: pytest tests/ -m integration
