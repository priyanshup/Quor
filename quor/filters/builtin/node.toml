# quor built-in filter: Node.js ecosystem wrapper noise (QB-006A), tool-aware
# routing through the wrapper (QB-006B), and dedicated filters for the rest of
# the high-value Node/JS toolchain (QB-006C: tsc, jest, vitest, prettier,
# next, turbo).
#
# QB-059 added `bun` as a new dedicated filter (previously entirely unrouted
# — not a known base command at all) and hardened the pnpm/yarn blocks'
# diagnostic-shape coverage (dependency-resolution failures, peer-dependency
# conflicts, lockfile mismatches, workspace errors, lifecycle script
# failures) — see each block's own QB-059 comments for the two real bugs
# found and fixed along the way (pnpm's over-broad WARN-line collapsing,
# yarn's word-boundary gap that deleted Berry's own failure summary).
#
# Generic-only for the npm/npx/pnpm/yarn blocks: strips noise that these
# wrappers themselves print on every invocation (progress ticks, funding/audit
# nags, deprecation warning spam, step banners) regardless of what subcommand
# or wrapped script is running.
#
# QB-006B/QB-006C (this file's tool-aware blocks — eslint, tsc, jest, vitest,
# prettier): when the wrapped tool's name is *literally present in the command
# string* (`npx eslint`, `npm exec eslint`, `pnpm exec/dlx eslint`, `yarn exec
# eslint`, bare `yarn eslint`), route to that tool's own filter instead of the
# generic wrapper filter — pure command-string pattern matching, no
# content-based routing, no package.json inspection. Each of these tools is
# also directly known as a bare invocation (`tsc`, `jest`, `vitest`,
# `prettier` — see `_KNOWN_BASE_COMMANDS` in quor/rewrite/rules.py), since all
# four are commonly run directly (globally installed, or via a `node_modules/
# .bin`-augmented PATH) as well as through a wrapper. `[[filter]]` blocks in a
# TOML file are tried in declaration order (see FilterRegistry.find()'s
# first-match-wins semantics), so every tool-aware block MUST stay before the
# generic npm/npx/pnpm/yarn blocks below — the same specificity-via-ordering
# idiom used for cat-python.toml vs cat.toml in QB-005, just within one file
# instead of across two.
#
# `next lint` is also routed to the eslint filter (added to the eslint
# block's own match_command, not a separate block): Next.js's `next lint`
# subcommand runs ESLint under the hood and produces byte-identical stylish
# output, so this is a pure reuse of the existing filter — no new stages, no
# duplicated stage config. See §"eslint" below.
#
# `npm test` / `npm run build` / `npm run lint` / any `<wrapper> run <script>`
# form is deliberately NOT matched here and never will be: the script name is
# an alias defined in package.json, and resolving what it actually runs would
# require reading package.json, which is out of scope by requirement. Only
# invocation shapes where the real tool name appears directly in the command
# (exec/dlx/npx forms, or yarn's bare-binary shorthand) are eligible for
# routing. If no specific filter matches, these commands fall through
# unchanged to the generic npm/npx/pnpm/yarn filters below — fallback needs no
# special-case code, it's the existing "first match wins" registry behavior.
#
# No max_tokens stage in the generic npm/npx/pnpm/yarn filters, unlike most
# other built-in filters: they can all wrap an arbitrary-length underlying
# command (`npm test`, `npm run build`, `npx jest`, `pnpm run x`, `yarn
# build`), and a token-budget stage would risk truncating that wrapped tool's
# real, actionable output. The same reasoning applies to `turbo` below — it
# executes arbitrary per-package scripts, so it also has no max_tokens stage.
# `next` (build/dev/start) is different: unlike npm/turbo it isn't a generic
# wrapper around an arbitrary user-defined script, it's Next.js's own fixed
# build/dev pipeline (bounded output shape, like tsc/eslint), so it gets a
# max_tokens safety net like the other tool-aware filters below.
# eslint/tsc/jest/vitest/prettier all use max_tokens because once routed
# there the wrapped tool is *known* (a fixed output shape), matching the same
# precedent as mypy/ruff in build.toml.
#
# Composed entirely from existing stage types (remove_ansi, group_repeated,
# strip_lines, deduplicate_consecutive, max_tokens) — no new stage, no
# registry/dispatcher/Pipeline/Engine/ContentMask/StageHandler change.
# Requires npm/npx/pnpm/yarn to be known base commands rather than
# transparent prefixes (see quor/rewrite/rules.py, QB-006A) so their output is
# ever routed through Quor at all; tsc/jest/vitest/prettier/next/turbo are
# added as known base commands in their own right for QB-006C (some are also
# reachable wrapped, matched by the same filter's match_command regex).
schema_version = 1

# ---------------------------------------------------------------------------
# eslint — tool-aware routing (QB-006B)
# ---------------------------------------------------------------------------

[[filter]]
name = "eslint"
match_command = '^(npx|npm exec|pnpm exec|pnpm dlx|yarn exec|yarn)\s+(-\S+\s+)*(--\s+)?eslint(?=\s|$)|^next\s+lint(?=\s|$)'
abort_unless = ["error", "warning", "problem"]
on_empty = "eslint: no issues found."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# exact_match=true (QB-006B follow-up): shape-only matching (mypy's default
# in build.toml) would merge different rule violations that merely share the
# "L:C  error|warning  ..." shape — wrong for ESLint, where each line is a
# distinct diagnostic. exact_match requires the full line to be byte-identical
# before it's folded into a run, so only genuinely repeated diagnostics
# collapse; different rules, messages, or locations always stay separate.
patterns = ['^\s*\d+:\d+\s+(error|warning)\s']
min_count = 2
exact_match = true

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*$',
]
preserve_patterns = [
    '(?i)error',
    '(?i)warning',
    '✖',
    '(?i)problem',
    '(?i)fixable',
]

[[filter.stages]]
type = "max_tokens"
limit = 400
strategy = "tail"

[[filter.tests]]
description = "Violations and problem summary preserved for npx eslint"
input = "/Users/dev/project/src/index.js\n  12:5   error    'foo' is defined but never used  no-unused-vars\n  34:10  warning  Missing semicolon  semi\n\n✖ 2 problems (1 error, 1 warning)\n"
must_contain = ["no-unused-vars", "✖ 2 problems (1 error, 1 warning)"]

[[filter.tests]]
description = "Byte-identical repeated diagnostics collapse to (×N)"
input = "/src/a.js\n  1:1  error  Missing semicolon  semi\n  1:1  error  Missing semicolon  semi\n\n✖ 2 problems (2 errors, 0 warnings)\n"
must_contain = ["(×2)", "✖ 2 problems (2 errors, 0 warnings)"]

[[filter.tests]]
description = "Same rule at different line numbers must NOT collapse — each is a distinct diagnostic"
input = "/src/a.js\n  1:1  error  Missing semicolon  semi\n  2:1  error  Missing semicolon  semi\n  3:1  error  Missing semicolon  semi\n  4:1  error  Missing semicolon  semi\n\n✖ 4 problems (4 errors, 0 warnings)\n"
must_contain = ["1:1", "2:1", "3:1", "4:1", "✖ 4 problems (4 errors, 0 warnings)"]

[[filter.tests]]
description = "Fixable-with-fix note and single violation preserved"
input = "/src/b.js\n  5:10  error  Unexpected console statement  no-console\n\n✖ 1 problem (1 error, 0 warnings)\n  1 error and 0 warnings potentially fixable with the `--fix` option.\n"
must_contain = ["no-console", "✖ 1 problem", "potentially fixable"]

[[filter.tests]]
description = "QB-006C: next lint (ESLint under the hood) routes to this same filter"
input = "./src/index.js\n  12:5   error    'foo' is defined but never used  no-unused-vars\n\n✖ 1 problem (1 error, 0 warnings)\n"
must_contain = ["no-unused-vars", "✖ 1 problem (1 error, 0 warnings)"]

# ---------------------------------------------------------------------------
# tsc — TypeScript compiler diagnostics (QB-006C)
# ---------------------------------------------------------------------------

[[filter]]
name = "tsc"
match_command = '^tsc(?=\s|$)|^(npx|npm exec|pnpm exec|pnpm dlx|yarn exec|yarn)\s+(-\S+\s+)*(--\s+)?tsc(?=\s|$)'
abort_unless = ["error", "Error"]
on_empty = "tsc: no issues found."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# QB-044: shape-based grouping (exact_match=false) was rejected here in the
# original QB-006C design — see git history / docs/ALGORITHMS.md — because
# it would treat *any* two lines matching the generic `error TS\d+:` shape
# as "the same repetition" regardless of whether the error code/message
# actually matched, and tsc realistically produces long runs of genuinely
# *different* diagnostics back-to-back (one per file, one per call site)
# far more often than mypy does. The location-normalized mechanism proven
# on pytest/mypy removes exactly that risk: location_pattern captures only
# the `file(line,col)` prefix, so two lines only ever group if everything
# after it — including the TS error code and full message — is
# byte-identical. Must run before strip_lines below: strip_lines's own
# preserve_patterns PROTECTs every diagnostic line first, and
# group_repeated never touches PROTECT lines (same ordering already
# established for pytest/mypy/npm). scope="global" additionally lets
# same-message errors collapse even when not adjacent — real tsc runs
# interleave unrelated diagnostics between repeats of the same root cause
# far more often than this filter's small benchmark corpus shows.
# min_count=2 (lower than mypy's 3): safe here specifically because the
# comparison is exact-after-location-removal, not shape-based — the same
# reasoning eslint's exact_match=True block above already relies on at
# min_count=2.
patterns = ['^\S+\(\d+,\d+\): error TS\d+: ']
location_pattern = '^(\S+\(\d+,\d+\)): '
min_count = 2
scope = "global"

[[filter.stages]]
type = "strip_lines"
# Deliberately no shape-based (exact_match=false) grouping in *this* stage
# — see the group_repeated stage above for why, and how QB-044's
# location-normalized mechanism now safely covers repeated diagnostics
# instead.
patterns = [
    '^Found \d+ errors?( in \d+ files?)?\.?$',
    '^\s*$',
]
preserve_patterns = [
    # Deliberately specific to the real diagnostic-line shape
    # (`error TSxxxx:`), not a bare `(?i)error` — the latter would also
    # match (and thus protect from stripping) the "Found N errors" summary
    # line itself, since "errors" contains "error". Same reasoning as
    # mypy's `error:` preserve pattern in build.toml.
    'error TS\d+:',
]

[[filter.stages]]
type = "max_tokens"
limit = 400
strategy = "tail"

[[filter.tests]]
description = "Diagnostics and summary line preserved for bare tsc"
input = "src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nFound 1 error in 1 file.\n"
must_contain = ["error TS2345", "Argument of type 'string'"]

[[filter.tests]]
description = "abort_unless: clean run (tsc prints nothing on success) is untouched"
input = ""
must_contain = []

[[filter.tests]]
description = "Summary line stripped when errors are present"
input = "src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nFound 1 error in 1 file.\n"
must_not_contain = ["Found 1 error"]

[[filter.tests]]
description = "Distinct diagnostics on different lines/files all preserved, never merged"
input = "src/a.ts(1,1): error TS2345: Argument mismatch.\nsrc/b.ts(2,1): error TS2322: Type mismatch.\nsrc/c.ts(3,1): error TS7006: Implicit any.\nFound 3 errors in 3 files.\n"
must_contain = ["src/a.ts(1,1)", "src/b.ts(2,1)", "src/c.ts(3,1)", "TS2345", "TS2322", "TS7006"]
must_not_contain = ["(×", "Found 3 errors"]

[[filter.tests]]
description = "Routed correctly via npx/pnpm wrapper forms"
input = "src/index.ts(3,7): error TS7006: Parameter 'x' implicitly has an 'any' type.\nFound 1 error in 1 file.\n"
must_contain = ["TS7006"]

[[filter.tests]]
description = "QB-044: repeated identical diagnostic across different files, non-adjacent (global scope), collapses; the unrelated diagnostic in between stays untouched"
input = "src/a.ts(1,1): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nsrc/other.ts(4,4): error TS7006: Parameter 'y' implicitly has an 'any' type.\nsrc/b.ts(9,9): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nFound 3 errors in 3 files.\n"
must_contain = [
    "src/a.ts(1,1): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "1 more with the same message at:",
    "src/b.ts(9,9)",
    "src/other.ts(4,4): error TS7006",
]
must_not_contain = [
    "src/b.ts(9,9): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "Found 3 errors",
]

[[filter.tests]]
description = "QB-044: repeated identical diagnostic across different line/column numbers in the same file, non-adjacent, collapses"
input = "src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nsrc/bar.ts(2,2): error TS7006: Parameter 'x' implicitly has an 'any' type.\nsrc/foo.ts(41,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nFound 3 errors in 2 files.\n"
must_contain = [
    "src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "1 more with the same message at:",
    "src/foo.ts(41,5)",
    "src/bar.ts(2,2): error TS7006",
]
must_not_contain = [
    "src/foo.ts(41,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
]

[[filter.tests]]
description = "QB-044 safety: same TS error code with different message text never collapses — only the location prefix is stripped, never the message"
input = "src/a.ts(1,1): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nsrc/b.ts(2,2): error TS2345: Argument of type 'boolean' is not assignable to parameter of type 'number'.\nFound 2 errors in 2 files.\n"
must_contain = ["src/a.ts(1,1)", "src/b.ts(2,2)", "'string'", "'boolean'"]
must_not_contain = ["more with the same message", "(×"]

[[filter.tests]]
description = "QB-044: a single occurrence of a diagnostic is left completely unchanged"
input = "src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nFound 1 error in 1 file.\n"
must_contain = ["src/foo.ts(10,5): error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'."]
must_not_contain = ["more with the same message", "(×"]

# ---------------------------------------------------------------------------
# jest — test runner (QB-006C)
# ---------------------------------------------------------------------------

[[filter]]
name = "jest"
match_command = '^jest(?=\s|$)|^(npx|npm exec|pnpm exec|pnpm dlx|yarn exec|yarn)\s+(-\S+\s+)*(--\s+)?jest(?=\s|$)'
abort_unless = ["FAIL ", "●"]
on_empty = "jest: no issues found."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^PASS\s+\S',
    '^Ran all test suites',
    # Framework-internal stack frames through node_modules — same
    # user-frame-vs-library-frame distinction pytest.toml makes for
    # site-packages/dist-packages; the failing assertion and the user's own
    # frame always survive since only lines mentioning node_modules match.
    '(?i)^\s*at .*node_modules[\\/]',
]
preserve_patterns = [
    '^FAIL\s',
    '●',
    '(?i)error',
    'AssertionError',
    'Expected:',
    'Received:',
    '^Test Suites:',
    '^Tests:',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 500
strategy = "tail"

[[filter.tests]]
description = "PASS suite lines stripped; FAIL and failure detail preserved"
input = "PASS  src/foo.test.js\nFAIL  src/bar.test.js\n  ● Bar suite › does a thing\n    expect(received).toBe(expected)\n    Expected: 5\n    Received: 4\nTest Suites: 1 failed, 1 passed, 2 total\nTests:       1 failed, 5 passed, 6 total\n"
must_contain = ["FAIL  src/bar.test.js", "Expected: 5", "Received: 4", "Tests:       1 failed, 5 passed, 6 total"]
must_not_contain = ["PASS  src/foo.test.js"]

[[filter.tests]]
description = "abort_unless: all-passing run returned unchanged"
input = "PASS  src/foo.test.js\nPASS  src/bar.test.js\nTest Suites: 2 passed, 2 total\nTests:       6 passed, 6 total\nRan all test suites.\n"
must_contain = ["PASS  src/foo.test.js", "Ran all test suites."]

[[filter.tests]]
description = "node_modules internal frames stripped; user's own frame kept"
input = "FAIL  src/bar.test.js\n  ● does a thing\n    Error: boom\n      at Object.<anonymous> (src/bar.test.js:10:20)\n      at Runtime._execModule (node_modules/jest-runtime/build/index.js:1439:24)\n"
must_contain = ["src/bar.test.js:10:20", "Error: boom"]
must_not_contain = ["node_modules/jest-runtime"]

[[filter.tests]]
description = "Routed correctly via yarn bare shorthand"
input = "FAIL  src/a.test.js\nTests:       1 failed, 0 passed, 1 total\n"
must_contain = ["FAIL  src/a.test.js"]

# ---------------------------------------------------------------------------
# vitest — test runner with distinct symbol-based reporter output (QB-006C)
# ---------------------------------------------------------------------------

[[filter]]
name = "vitest"
match_command = '^vitest(?=\s|$)|^(npx|npm exec|pnpm exec|pnpm dlx|yarn exec|yarn)\s+(-\S+\s+)*(--\s+)?vitest(?=\s|$)'
abort_unless = ["×", "FAIL"]
on_empty = "vitest: no issues found."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*✓\s',
    '(?i)^\s*at .*node_modules[\\/]',
]
preserve_patterns = [
    '×',
    '❯',
    '→',
    '(?i)error',
    'expected',
    '^\s*Test Files',
    '^\s*Tests\s',
    '^\s*Duration',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 500
strategy = "tail"

[[filter.tests]]
description = "Passing checkmarks stripped; failing marker and detail preserved"
input = " ✓ src/foo.test.ts (3)\n ❯ src/bar.test.ts (2)\n   ✓ adds numbers\n   × subtracts numbers\n     → expected 3 to be 4\n Test Files  1 failed | 1 passed (2)\n      Tests  1 failed | 3 passed (4)\n"
must_contain = ["× subtracts numbers", "expected 3 to be 4", "Test Files  1 failed | 1 passed (2)"]
must_not_contain = ["✓ src/foo.test.ts", "✓ adds numbers"]

[[filter.tests]]
description = "abort_unless: all-passing run returned unchanged"
input = " ✓ src/foo.test.ts (2)\n Test Files  1 passed (1)\n      Tests  2 passed (2)\n"
must_contain = ["✓ src/foo.test.ts (2)"]

[[filter.tests]]
description = "node_modules internal frames stripped from a failing test"
input = " ❯ src/bar.test.ts (1)\n   × fails\n     → boom\n      at internal (node_modules/vitest/dist/index.js:1:1)\n"
must_contain = ["× fails", "boom"]
must_not_contain = ["node_modules/vitest"]

[[filter.tests]]
description = "Distinct unicode summary format (not confused with jest's ASCII format)"
input = " ❯ src/bar.test.ts (1)\n   × fails\n Test Files  1 failed (1)\n      Tests  1 failed (1)\n"
must_contain = ["Test Files  1 failed (1)", "Tests  1 failed (1)"]

# ---------------------------------------------------------------------------
# prettier — code formatter, low-noise by nature (QB-006C)
# ---------------------------------------------------------------------------

[[filter]]
name = "prettier"
match_command = '^prettier(?=\s|$)|^(npx|npm exec|pnpm exec|pnpm dlx|yarn exec|yarn)\s+(-\S+\s+)*(--\s+)?prettier(?=\s|$)'
abort_unless = ["[warn]", "Code style issues", "error", "Error"]
on_empty = "prettier: no issues found."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^Checking formatting\.\.\.$',
]
preserve_patterns = [
    '\[warn\]',
    'Code style issues',
    '(?i)error',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 400
strategy = "tail"

[[filter.tests]]
description = "Checking-formatting banner stripped; warn files and summary preserved"
input = "Checking formatting...\n[warn] src/foo.js\n[warn] src/bar.js\n[warn] Code style issues found in 2 files. Run Prettier with --write to fix.\n"
must_contain = ["[warn] src/foo.js", "[warn] src/bar.js", "Code style issues found in 2 files"]
must_not_contain = ["Checking formatting..."]

[[filter.tests]]
description = "abort_unless: clean --check run returned unchanged"
input = "Checking formatting...\nAll matched files use Prettier code style!\n"
must_contain = ["All matched files use Prettier code style!"]

[[filter.tests]]
description = "Syntax error output preserved"
input = "[error] src/broken.js: SyntaxError: Unexpected token (10:2)\n"
must_contain = ["SyntaxError: Unexpected token"]

# ---------------------------------------------------------------------------
# npm — install/ci/update/audit/etc. wrapper noise
# ---------------------------------------------------------------------------

[[filter]]
name = "npm"
match_command = '^npm\b'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# exact_match left at its default (false, shape-based): intentional — this is
# generic wrapper-noise reduction (QB-006A), not diagnostics. We don't care
# which specific package triggered each deprecation warning, only that N
# deprecation warnings happened; one representative example + count is the
# desired summary, unlike eslint below where every line is a distinct,
# individually meaningful diagnostic.
patterns = ['(?i)^npm (warn|WARN) deprecated\b']
min_count = 2

[[filter.stages]]
type = "strip_lines"
patterns = [
    '(?i)^\d+ packages? (is|are) looking for funding$',
    '(?i)run `npm fund` for details',
    '(?i)^to address (all|\d+) (issues?|vulnerabilit)',
    '(?i)^\s*npm audit fix( --force)?\s*$',
    '(?i)^run `npm audit` for details\.?$',
    # QB-052: the npm-version upgrade nag prints on nearly every invocation
    # regardless of subcommand — same "wrapper noise" category as the
    # funding/audit CTAs above, just missed originally. Real usage showed
    # npm's small real average savings (-9.1%) being eaten by fixed per-run
    # overhead; this is pure boilerplate with nothing in preserve_patterns
    # below that would need rescuing from it.
    '(?i)^npm notice\b',
]
preserve_patterns = [
    '(?i)\berror\b',
    '(?i)npm err!',
    '(?i)\bvulnerabilit',
    '(?i)^severity:',
    '(?i)fix available',
    'advisories/',
    '(?i)^added \d+ package',
    '(?i)^up to date, audited \d+ package',
    '(?i)^changed \d+ package',
    '(?i)^removed \d+ package',
    '(?i)^npm (warn|WARN)\b',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Repeated deprecation warnings collapse; install summary and clean audit result preserved"
input = "npm warn deprecated inflight@1.0.6: This module is not supported, and leaks memory.\nnpm warn deprecated glob@7.2.3: Glob versions prior to v9 are no longer supported\nnpm warn deprecated rimraf@2.7.1: Rimraf versions prior to v4 are no longer supported\n\nadded 152 packages, and audited 153 packages in 4s\n\n23 packages are looking for funding\n  run `npm fund` for details\n\nfound 0 vulnerabilities\n"
must_contain = ["deprecated inflight", "(×3)", "added 152 packages, and audited 153 packages in 4s", "found 0 vulnerabilities"]
must_not_contain = ["glob@7.2.3", "rimraf@2.7.1", "looking for funding", "npm fund"]

[[filter.tests]]
description = "Audit findings and severity preserved; address/CTA nag stripped"
input = "# npm audit report\n\nsemver  <5.7.2\nSeverity: moderate\nRegular Expression Denial of Service - https://github.com/advisories/GHSA-c2qf-rxjj-qqgw\nfix available via `npm audit fix`\nnode_modules/semver\n  1 vulnerability moderate\n\n3 vulnerabilities (2 moderate, 1 high)\n\nTo address all issues, run:\n  npm audit fix\n\nRun `npm audit` for details.\n"
must_contain = ["Severity: moderate", "advisories/GHSA-c2qf-rxjj-qqgw", "fix available via", "3 vulnerabilities (2 moderate, 1 high)"]
must_not_contain = ["To address all issues, run", "Run `npm audit` for details"]

[[filter.tests]]
description = "npm ERR! failure output never touched"
input = "npm warn deprecated foo@1.0.0: old\nnpm ERR! code ENOENT\nnpm ERR! syscall open\nnpm ERR! path /some/path/package.json\nnpm ERR! errno -4058\n"
must_contain = ["npm ERR! code ENOENT", "npm ERR! errno -4058"]

[[filter.tests]]
description = "QB-052: npm version-upgrade notice banner stripped; install summary preserved"
input = "npm notice \nnpm notice New major version of npm available! 9.8.1 -> 10.2.4\nnpm notice Changelog: https://github.com/npm/cli/releases/tag/v10.2.4\nnpm notice To update run: npm install -g npm@10.2.4\nnpm notice \nadded 152 packages, and audited 153 packages in 4s\n\nfound 0 vulnerabilities\n"
must_contain = ["added 152 packages, and audited 153 packages in 4s", "found 0 vulnerabilities"]
must_not_contain = ["npm notice", "New major version"]

# ---------------------------------------------------------------------------
# npx — package resolution/auto-install preamble only
# ---------------------------------------------------------------------------

[[filter]]
name = "npx"
match_command = '^npx\b'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# exact_match left at its default (false, shape-based) — same reasoning as
# the npm filter above: npx delegates to npm's own install machinery, so its
# deprecation spam has the same shape and the same "N happened, show one
# example" intent, not per-package precision.
patterns = ['(?i)^npm (warn|WARN) deprecated\b']
min_count = 2

[[filter.stages]]
type = "strip_lines"
patterns = [
    '(?i)^npm (warn|WARN) exec\b',
    '(?i)^need to install the following packages:$',
    '(?i)^ok to proceed\b',
]
preserve_patterns = [
    '(?i)\berror\b',
    '(?i)npm err!',
    '(?i)\bwarning\b',
    '(?i)\bfailed\b',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Auto-install resolution preamble stripped; wrapped tool's own output untouched"
input = "npm warn exec The following package was not found and will be installed: cowsay@1.6.0\nMoo says hello\n"
must_contain = ["Moo says hello"]
must_not_contain = ["npm warn exec"]

[[filter.tests]]
description = "Wrapped tool's error output survives despite resolution preamble"
input = "npm warn exec The following package was not found and will be installed: foo@1.0.0\nError: something broke\n"
must_contain = ["Error: something broke"]
must_not_contain = ["npm warn exec"]

# ---------------------------------------------------------------------------
# pnpm — install/add/update/audit wrapper noise
# ---------------------------------------------------------------------------

[[filter]]
name = "pnpm"
match_command = '^pnpm\b'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# QB-059: narrowed from a bare '^\s*warn\b' to 'warn\s+deprecated\b' —
# mirrors npm/npx's own deprecation-warning pattern exactly (reuse, not a
# new idiom). The old bare pattern was shape-matching on *any* WARN line
# regardless of content, which is unsafe: pnpm's "WARN  Issues with peer
# dependencies found" header and a "WARN deprecated foo@1.0.0: ..." line
# share that shape but are two genuinely different, individually
# user-actionable diagnostics — verified they would silently merge into
# one collapsed line under the old pattern, discarding whichever warning
# didn't happen to be first. Deprecation notices are the one pnpm warning
# type that's genuinely fungible (the specific package rarely changes what
# action you take), the same reasoning npm's own pattern already relies on.
patterns = ['(?i)^\s*warn\s+deprecated\b']
min_count = 2

[[filter.stages]]
type = "strip_lines"
patterns = [
    '(?i)^lockfile is up to date, resolution step is skipped$',
    '(?i)^progress: resolved \d+, reused \d+, downloaded \d+',
    '^\s*\++\s*$',
]
preserve_patterns = [
    '(?i)\berror\b',
    '(?i)err_pnpm',
    '(?i)^packages: [+-]\d',
    '(?i)^done in \d',
    '(?i)^dependencies:$',
    '(?i)\bvulnerabilit',
    '(?i)^severity:',
    # QB-059: defense-in-depth documentation for the diagnostic shapes this
    # filter is now explicitly meant to preserve (peer-dependency conflicts,
    # workspace protocol errors, lifecycle script failures) — none of these
    # are actually at risk from any strip/collapse pattern above (no pattern
    # in this filter targets a WARN-header, tree-drawing, or ELIFECYCLE
    # line), so nothing here changes observable behavior; it documents
    # intent the same way java.toml's own preserve_patterns comment does.
    '(?i)unmet peer',
    '(?i)missing peer',
    '(?i)issues with peer dependencies',
    '✕',
    '(?i)elifecycle',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Lockfile/progress noise and plus-sign progress bar stripped; package count and deps preserved"
input = "Lockfile is up to date, resolution step is skipped\nProgress: resolved 1, reused 0, downloaded 0, added 0\nProgress: resolved 152, reused 140, downloaded 12, added 152, done\nPackages: +152\n++++++++++++++++++++++++++++++++++++++++++++++++++++\n\ndependencies:\n+ express 4.18.2\n\nDone in 3.2s\n"
must_contain = ["Packages: +152", "dependencies:", "+ express 4.18.2", "Done in 3.2s"]
must_not_contain = ["Lockfile is up to date", "Progress: resolved", "++++++++++++++++++++++++++++++++++++++++++++++++++++"]

[[filter.tests]]
description = "pnpm structured fetch error preserved despite progress noise"
input = "Progress: resolved 10, reused 0, downloaded 0\nERR_PNPM_FETCH_404  GET https://registry.npmjs.org/nonexistent-pkg: Not Found - 404\n"
must_contain = ["ERR_PNPM_FETCH_404"]
must_not_contain = ["Progress: resolved"]

[[filter.tests]]
description = "QB-059: a genuine deprecation-warning run still collapses (unaffected by the narrowing), but a distinct peer-dependency-issues header adjacent to it is never absorbed into that run's count"
input = "WARN  Issues with peer dependencies found\nWARN deprecated core-js@2.6.12: core-js@<3.23.3 is no longer maintained\nWARN deprecated request@2.88.2: request has been deprecated\nPackages: +1\n"
must_contain = [
    "WARN  Issues with peer dependencies found",
    "WARN deprecated core-js@2.6.12: core-js@<3.23.3 is no longer maintained (×2)",
]
must_not_contain = [
    "WARN  Issues with peer dependencies found (×",
    "WARN deprecated request@2.88.2: request has been deprecated\n",
]

[[filter.tests]]
description = "QB-059: peer-dependency conflict tree (unmet/missing peer, ✕ markers) survives in full, none of it is stripped or collapsed"
input = "WARN  Issues with peer dependencies found\n.\n├─┬ react-dom 18.2.0\n│ └── ✕ unmet peer react@^18.2.0: found 17.0.2\n└─┬ some-lib 1.0.0\n  └── ✕ missing peer typescript@>=4.5\n"
must_contain = [
    "✕ unmet peer react@^18.2.0: found 17.0.2",
    "✕ missing peer typescript@>=4.5",
]

[[filter.tests]]
description = "QB-059: lockfile mismatch (frozen-lockfile CI failure) — the ERR_PNPM_OUTDATED_LOCKFILE header and its failure-reason detail both survive"
input = "Lockfile is up to date, resolution step is skipped\n ERR_PNPM_OUTDATED_LOCKFILE  Cannot install with \"frozen-lockfile\" because pnpm-lock.yaml is not up to date with <ROOT>/package.json\n\nFailure reason:\nspecifiers in the lockfile don't match specifiers in package.json:\n* 1 dependencies were added: react-router-dom@^6.20.0\n"
must_contain = [
    "ERR_PNPM_OUTDATED_LOCKFILE",
    "Failure reason:",
    "react-router-dom@^6.20.0",
]
must_not_contain = ["Lockfile is up to date"]

[[filter.tests]]
description = "QB-059: workspace protocol error (package referenced but absent from the workspace) survives"
input = "Progress: resolved 42, reused 40, downloaded 0\n ERR_PNPM_WORKSPACE_PKG_NOT_FOUND  In : \"@myorg/ui\" is in the dependencies but no package named \"@myorg/ui\" is present in the workspace\n"
must_contain = ["ERR_PNPM_WORKSPACE_PKG_NOT_FOUND", "@myorg/ui"]
must_not_contain = ["Progress: resolved"]

[[filter.tests]]
description = "QB-059: lifecycle script failure — the wrapped build script's own error output and the ELIFECYCLE marker both survive"
input = "> my-app@1.0.0 build /home/dev/my-app\n> tsc -b\n\nsrc/index.ts:10:5 - error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\n\nFound 1 error.\n\n ELIFECYCLE  Command failed with exit code 2.\n"
must_contain = [
    "error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "ELIFECYCLE  Command failed with exit code 2.",
]

# ---------------------------------------------------------------------------
# yarn — install/add/upgrade wrapper noise (classic + Berry step banners)
# ---------------------------------------------------------------------------

[[filter]]
name = "yarn"
match_command = '^yarn\b'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# exact_match left at its default (false, shape-based): intentional and
# tested below — two different peer-dependency warnings (different package
# names) are expected to collapse together into one example + count, the
# same generic-noise rationale as npm/npx/pnpm above.
patterns = ['(?i)^warning\b']
min_count = 2

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\[\d+/\d+\] (Resolving|Fetching|Linking|Building)',
    '^➤ YN0000:',
    '(?i)^info visit http',
]
preserve_patterns = [
    # QB-059: widened from '\berror\b' to '\berrors?\b' — the singular-only
    # pattern has a real word-boundary gap: \berror\b requires a boundary
    # immediately after "error", which "errors" never has (the following
    # "s" is itself a word character). Verified this let Yarn Berry's own
    # completion-status line — "➤ YN0000: · Failed with errors in 842ms" —
    # fall through to the '^➤ YN0000:' strip pattern below and be deleted
    # outright, even on a genuine install failure (the filter's *only*
    # signal that anything went wrong). Widening to '\berrors?\b' is a
    # strict superset of the old pattern (every prior match still matches),
    # so no currently-passing case is affected; it only rescues the plural
    # form. Checked before '^➤ YN0000:' below per strip_lines' own
    # documented precedence (preserve_patterns always wins).
    '(?i)\berrors?\b',
    '(?i)\bfailed\b',
    '(?i)^success\b',
    '(?i)^done in \d',
    '(?i)\bvulnerabilit',
    '(?i)^severity:',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Classic yarn step banners stripped; success/timing summary preserved"
input = "yarn install v1.22.19\n[1/4] Resolving packages...\n[2/4] Fetching packages...\n[3/4] Linking dependencies...\n[4/4] Building fresh packages...\nsuccess Saved lockfile.\nDone in 12.34s.\n"
must_contain = ["success Saved lockfile.", "Done in 12.34s."]
must_not_contain = ["Resolving packages", "Fetching packages", "Linking dependencies", "Building fresh packages"]

[[filter.tests]]
description = "Repeated peer-dependency warnings collapse; command failure preserved"
input = "warning \"eslint > file-entry-cache@6.0.1\" has unmet peer dependency \"flat-cache@^3.0.4\".\nwarning \"eslint > table@6.8.1\" has unmet peer dependency \"ajv@^8.0.1\".\nerror Command failed with exit code 1.\n"
must_contain = ["unmet peer dependency", "(×2)", "error Command failed with exit code 1."]

[[filter.tests]]
description = "QB-059: Yarn Berry install failure — the step banner is stripped, but the 'Failed with errors' completion line (previously deleted by the plural word-boundary gap) survives, along with the specific peer-dependency error that caused it"
input = "➤ YN0000: · Resolution step\n➤ YN0001: │ workspace-app@workspace:. doesn't provide typescript (p66c35), requested by @myorg/utils\n➤ YN0000: · Failed with errors in 842ms\n"
must_contain = [
    "workspace-app@workspace:. doesn't provide typescript",
    "➤ YN0000: · Failed with errors in 842ms",
]
must_not_contain = ["➤ YN0000: · Resolution step"]

[[filter.tests]]
description = "QB-059: Yarn Berry successful install — step banners are still stripped as pure noise, nothing is falsely preserved"
input = "➤ YN0000: · Resolution step\n➤ YN0000: · Fetch step\n➤ YN0000: · Link step\n➤ YN0000: · Done in 1s 234ms\n"
must_not_contain = ["Resolution step", "Fetch step", "Link step", "Done in 1s 234ms"]

[[filter.tests]]
description = "QB-059: lockfile mismatch under --frozen-lockfile survives"
input = "yarn install v1.22.19\n[1/4] Resolving packages...\nerror Your lockfile needs to be updated, but yarn was run with '--frozen-lockfile'.\ninfo Visit https://yarnpkg.com/en/docs/cli/install for documentation about this command.\n"
must_contain = ["error Your lockfile needs to be updated, but yarn was run with '--frozen-lockfile'."]
must_not_contain = ["Resolving packages", "Visit https://yarnpkg.com"]

[[filter.tests]]
description = "QB-059: workspace configuration error survives"
input = "yarn install v1.22.19\n[1/4] Resolving packages...\nerror Workspaces can only be enabled in private projects.\n"
must_contain = ["error Workspaces can only be enabled in private projects."]

[[filter.tests]]
description = "QB-059: lifecycle script failure — the wrapped script's own error output, the failure line, and the doc-link CTA noise are each handled correctly"
input = "yarn run v1.22.19\n$ tsc -b\nsrc/index.ts:10:5 - error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nerror Command failed with exit code 2.\ninfo Visit https://yarnpkg.com/en/docs/cli/run for documentation about this command.\n"
must_contain = [
    "error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "error Command failed with exit code 2.",
]
must_not_contain = ["Visit https://yarnpkg.com"]

# ---------------------------------------------------------------------------
# bun — install/add/remove/run wrapper noise (QB-059)
#
# Bun's own diagnostics are consistently prefixed `error:`/`warn:` (lowercase,
# colon-terminated — unlike npm's `npm ERR!`/pnpm's ` ERR_PNPM_*`/yarn's
# `error `/`warning ` conventions, but the same "always contains the literal
# word error/warn" property every other filter in this file already relies
# on). Deliberately conservative compared to npm/pnpm/yarn above: this
# filter strips only blank lines and collapses repeated `warn:` lines,
# nothing else. Bun's exact wrapper-noise output (spinner/progress lines,
# a resolution preamble, etc.) is not yet well-established in this corpus
# the way npm's/pnpm's/yarn's decade-plus-old, thoroughly-documented output
# shapes are — QB-059 chose not to invent unverified strip patterns against
# a fast-moving CLI (violates "deterministic only, no heuristics"). The
# version/hash banner line ("bun install v1.0.25 (9c68abdb)") is left alone
# for the same reason yarn's own "yarn install v1.22.19" banner is: low
# enough cost that a dedicated strip pattern isn't worth the risk of a false
# positive. No max_tokens stage — same reasoning as npm/npx/pnpm/yarn/turbo
# above: `bun run <script>`/`bun test` wrap an arbitrary user-defined
# command whose real output must never be truncated.
# ---------------------------------------------------------------------------

[[filter]]
name = "bun"
match_command = '^bun\b'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# Shape-based (default), same generic-noise rationale as npm/pnpm above —
# collapsing repeated bun warn: lines (e.g. several incorrect-peer-dependency
# notices) to one example + count.
patterns = ['(?i)^\s*warn:']
min_count = 2

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*$',
]
preserve_patterns = [
    '(?i)^\s*error:',
    '(?i)^\s*warn:',
    '(?i)\berrors?\b',
    '(?i)\bfailed\b',
    '(?i)lockfile',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Blank lines stripped; successful install summary and per-package install lines survive"
input = "bun install v1.0.25 (9c68abdb)\n\n + react@18.2.0\n + typescript@5.3.3\n\n 24 packages installed [812.00ms]\n"
must_contain = ["+ react@18.2.0", "+ typescript@5.3.3", "24 packages installed [812.00ms]"]

[[filter.tests]]
description = "Repeated peer-dependency warnings collapse to one example + count"
input = "warn: incorrect peer dependency \"react@^18.0.0\"\nwarn: incorrect peer dependency \"react-dom@^18.0.0\"\n 2 packages installed [400.00ms]\n"
must_contain = ["incorrect peer dependency", "(×2)", "2 packages installed [400.00ms]"]

[[filter.tests]]
description = "Dependency resolution failure (no matching version) survives untouched"
input = "bun install v1.0.25 (9c68abdb)\nerror: No matching version found for \"lodash@^99.0.0\"\n"
must_contain = ["error: No matching version found for \"lodash@^99.0.0\""]

[[filter.tests]]
description = "Lockfile mismatch under --frozen-lockfile survives"
input = "bun install v1.0.25 (9c68abdb)\nerror: lockfile had changes, but lockfile is frozen\n"
must_contain = ["error: lockfile had changes, but lockfile is frozen"]

[[filter.tests]]
description = "Workspace dependency-not-found error survives"
input = "bun install v1.0.25 (9c68abdb)\nerror: Workspace dependency \"@myorg/ui\" not found\n"
must_contain = ["error: Workspace dependency \"@myorg/ui\" not found"]

[[filter.tests]]
description = "Lifecycle script failure — the wrapped script's own error output and bun's own failure line both survive"
input = "$ tsc -b\nsrc/index.ts:10:5 - error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.\nerror: script \"build\" exited with code 2 (tsc -b)\n"
must_contain = [
    "error TS2345: Argument of type 'string' is not assignable to parameter of type 'number'.",
    "error: script \"build\" exited with code 2 (tsc -b)",
]

# ---------------------------------------------------------------------------
# next — Next.js CLI: build/dev/start step noise (QB-006C)
#
# `next lint` is NOT handled here — it's routed to the eslint filter above
# (added to that filter's own match_command), since it runs ESLint under the
# hood and produces identical output. Because the eslint `[[filter]]` block
# is declared earlier in this file, first-match-wins already sends `next
# lint` there before this broader `next` block is ever considered — no
# negative lookahead needed, same ordering idiom as everywhere else in this
# file.
# ---------------------------------------------------------------------------

[[filter]]
name = "next"
match_command = '^next(?=\s|$)'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*▲ Next\.js',
    '(?i)^\s*Creating an optimized production build \.\.\.\s*$',
    '(?i)^\s*Linting and checking validity of types \.\.\.\s*$',
    '(?i)^\s*Collecting page data \.\.\.\s*$',
    '(?i)^\s*Generating static pages \(\d+/\d+\)\s*$',
    '(?i)^\s*Finalizing page optimization \.\.\.\s*$',
    '^\s*$',
]
preserve_patterns = [
    '(?i)error',
    '(?i)warning',
    '(?i)failed to compile',
    'Route \(',
    'First Load JS',
    '✓ Compiled',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 500
strategy = "tail"

[[filter.tests]]
description = "Step banners stripped; route size table and compiled marker preserved"
input = "  ▲ Next.js 14.2.3\n\n   Creating an optimized production build ...\n ✓ Compiled successfully\n   Linting and checking validity of types ...\n   Collecting page data ...\n   Generating static pages (5/5)\n   Finalizing page optimization ...\n\nRoute (app)                              Size     First Load JS\n┌ ○ /                                    5.3 kB         92 kB\n└ ○ /about                               182 B          87.2 kB\n+ First Load JS shared by all            87 kB\n"
must_contain = ["✓ Compiled successfully", "Route (app)", "5.3 kB         92 kB", "First Load JS shared by all"]
must_not_contain = ["Creating an optimized production build", "Collecting page data", "Generating static pages"]

[[filter.tests]]
description = "Build failure and type error preserved"
input = "  ▲ Next.js 14.2.3\n\n   Creating an optimized production build ...\nFailed to compile.\n\n./src/app/page.tsx:10:5\nType error: Argument of type 'string' is not assignable to parameter of type 'number'.\n"
must_contain = ["Failed to compile.", "Type error: Argument of type 'string'"]
must_not_contain = ["Creating an optimized production build"]

[[filter.tests]]
description = "Repeated hot-reload compiled lines during next dev collapse via dedup"
input = " ✓ Compiled /page in 120ms\n ✓ Compiled /page in 120ms\n ✓ Compiled /page in 95ms\n"
must_contain = ["✓ Compiled /page in 120ms", "✓ Compiled /page in 95ms"]

# ---------------------------------------------------------------------------
# turbo — Turborepo task runner: wraps arbitrary per-package scripts (QB-006C)
#
# Like npm/npx/pnpm/yarn above, turbo executes arbitrary user-defined scripts
# per package/task — so, same reasoning, no max_tokens stage here: it would
# risk truncating a wrapped task's real, actionable output. Only turbo's own
# preamble/cache-status lines are touched; a wrapped task's own output
# (prefixed `package:task: `) is never pattern-matched by this filter.
# ---------------------------------------------------------------------------

[[filter]]
name = "turbo"
match_command = '^turbo(?=\s|$)'

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "strip_lines"
# Deliberately no group_repeated stage here (tried first, then rejected —
# same conclusion as tsc above): shape-based grouping on
# `<pkg>:<task>: cache (miss|hit)` would collapse a "cache hit" and a
# "cache miss" line from two *different* packages together just because
# they share the shape, silently hiding which specific package actually
# missed cache — real information a monorepo build debugging session
# needs. Each per-package cache-status line is left as its own line, same
# treatment `git status`'s per-file lines get.
patterns = [
    '^• (Packages in scope|Running \S+ in \d+ packages?|Remote caching)',
]
preserve_patterns = [
    '(?i)error',
    '(?i)failed',
    '^FAIL\b',
    '^\s*Tasks:',
    '^Cached:',
    '^\s*Time:',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Preamble bullets stripped; task summary preserved"
input = "• Packages in scope: web, docs\n• Running build in 2 packages\n• Remote caching disabled\n\nweb:build: > next build\ndocs:build: > next build\n\n Tasks:    2 successful, 2 total\nCached:    0 cached, 2 total\n  Time:    3.821s\n"
must_contain = ["web:build: > next build", "Tasks:    2 successful, 2 total", "Time:    3.821s"]
must_not_contain = ["Packages in scope", "Running build in 2 packages", "Remote caching disabled"]

[[filter.tests]]
description = "Per-package cache-status lines survive individually, mixed hit/miss never merged"
input = "web:build: cache miss, executing abc123\ndocs:build: cache hit, replaying def456\nutils:build: cache miss, executing 789xyz\n\n Tasks:    3 successful, 3 total\n"
must_contain = ["web:build: cache miss", "docs:build: cache hit", "utils:build: cache miss", "Tasks:    3 successful, 3 total"]
must_not_contain = ["(×"]

[[filter.tests]]
description = "Wrapped task's own failure output survives untouched"
input = "web:build: > next build\nweb:build: Failed to compile.\nweb:build: Error: something broke\n\n Tasks:    0 successful, 1 total\n"
must_contain = ["web:build: Failed to compile.", "web:build: Error: something broke", "Tasks:    0 successful, 1 total"]
must_not_contain = ["table@6.8.1"]
