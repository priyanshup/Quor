# quor built-in filter: git
# Compresses common git command output: status, log, diff, blame.
schema_version = 1

[[filter]]
name = "git-status"
match_command = '^git\s+status\b'

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^  \(use "git',
    '^nothing to commit',
    '^nothing added to commit',
    '^no changes added to commit',
    '^On branch ',
    "^Your branch is up to date",
    "^Your branch is ahead",
]
preserve_patterns = [
    'modified:',
    'deleted:',
    'renamed:',
    'new file:',
    'conflict',
    'CONFLICT',
    'Unmerged',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.tests]]
description = "Help hints stripped, modified files preserved"
input = "On branch main\n  (use \"git add\" to stage)\n\tmodified:   src/main.py"
must_contain = ["modified:   src/main.py"]
must_not_contain = ["use \"git add\""]

[[filter.tests]]
description = "Conflict lines always preserved"
input = "CONFLICT (content): Merge conflict in src/app.py\nAutomatic merge failed"
must_contain = ["CONFLICT"]

[[filter.tests]]
description = "Clean working tree notice stripped"
input = "On branch main\nnothing to commit, working tree clean"
must_not_contain = ["nothing to commit"]

[[filter]]
name = "git-log"
match_command = '^git\s+log\b'

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^Author:',
    '^Date:',
    '^Merge:',
]
preserve_patterns = [
    'commit ',
    'fix',
    'feat',
    'BREAKING',
]

[[filter.stages]]
type = "max_tokens"
limit = 400
strategy = "head"

[[filter.tests]]
description = "Author and date stripped, commit hash preserved"
input = "commit abc1234\nAuthor: Dev <dev@example.com>\nDate:   Mon Jan 1 00:00:00 2024\n\n    feat: add feature"
must_contain = ["commit abc1234", "feat: add feature"]
must_not_contain = ["Author:", "Date:"]

[[filter.tests]]
description = "BREAKING change line always preserved"
input = "commit def5678\nAuthor: Dev <dev@example.com>\n\n    BREAKING CHANGE: removed old API"
must_contain = ["BREAKING CHANGE"]

[[filter.tests]]
description = "Head strategy keeps earliest commits"
input = "commit aaa0001\n\n    first commit\ncommit bbb0002\n\n    second commit"
must_contain = ["commit aaa0001"]

[[filter]]
name = "git-diff"
match_command = '^git\s+(diff|show)\b'

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^index ',
    '^diff --git ',
    '^--- a/',
    '^\+\+\+ b/',
    '^ $',
]
preserve_patterns = [
    '^\+',
    '^-',
    '^@@',
    '^rename from ',
    '^rename to ',
    '^similarity index ',
]

[[filter.stages]]
type = "collapse_unchanged_context"
context_lines = 1

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 600
strategy = "both"

[[filter.tests]]
description = "Index header stripped, hunk header preserved"
input = "diff --git a/foo.py b/foo.py\nindex abc..def 100644\n--- a/foo.py\n+++ b/foo.py\n@@ -1,3 +1,4 @@\n+new line"
must_contain = ["@@ -1,3 +1,4 @@", "+new line"]
must_not_contain = ["index abc..def"]

[[filter.tests]]
description = "Added and removed lines preserved"
input = "@@ -1,2 +1,2 @@\n-old line\n+new line\n context"
must_contain = ["-old line", "+new line"]

[[filter.tests]]
description = "Blank context lines stripped"
input = "@@ -1,3 +1,3 @@\n context line\n \n+added line"
must_contain = ["context line", "+added line"]

[[filter.tests]]
description = "Long unchanged context run collapsed, edits and window preserved"
input = "@@ -1,20 +1,20 @@\n context line 1\n context line 2\n context line 3\n context line 4\n context line 5\n context line 6\n context line 7\n context line 8\n context line 9\n context line 10\n-old line\n+new line"
must_contain = [
    "@@ -1,20 +1,20 @@",
    "context line 1",
    "unchanged lines omitted",
    "context line 10",
    "-old line",
    "+new line",
]
must_not_contain = ["context line 2", "context line 5", "context line 9"]

[[filter.tests]]
description = "Short unchanged context run cheaper than placeholder left untouched"
input = "@@ -1,5 +1,5 @@\n context line 1\n context line 2\n context line 3\n context line 4\n-old line\n+new line"
must_contain = ["context line 1", "context line 2", "context line 3", "context line 4", "-old line", "+new line"]
must_not_contain = ["unchanged lines omitted"]

[[filter.tests]]
description = "Max in-hunk gap between two nearby edits collapsed (git -U3 merges hunks up to a 6-line gap)"
input = "@@ -10,17 +10,17 @@ class OrderProcessor:\n     def process(self, order):\n         self._validate(order)\n         self._log_start(order)\n-        result = self._legacy_handler(order)\n+        result = self._new_handler(order, strict=True)\n         self._emit_metrics(result)\n         self._notify_downstream(result)\n         self._update_inventory(result)\n         self._record_audit_trail(order, result)\n         self._flush_pending_writes()\n         self._release_lock(order.lock_id)\n-        return result\n+        return result if result.ok else None\n     def _validate(self, order):\n         if not order.items:\n             raise ValueError(\"empty order\")"
must_contain = [
    "self._legacy_handler(order)",
    "self._new_handler(order, strict=True)",
    "4 unchanged lines omitted",
    "self._release_lock(order.lock_id)",
    "return result if result.ok else None",
]
must_not_contain = ["_notify_downstream", "_update_inventory", "_record_audit_trail"]

[[filter.tests]]
description = "QB-041 evidence fix: unchanged context line merely mentioning \"Error\" (e.g. an exception class name) is not force-protected and still collapses as part of a long unchanged run"
input = "@@ -1,15 +1,16 @@\n-        old_value = compute(order)\n+        old_value = compute(order, strict=True)\n         if amount <= 0:\n             raise ValueError(\"negative amounts not allowed\")\n         context line 2\n         context line 3\n         context line 4\n         context line 5\n         context line 6\n         context line 7\n         context line 8\n-        return old_value\n+        return old_value if old_value.ok else None"
must_contain = [
    "old_value = compute(order)",
    "old_value = compute(order, strict=True)",
    "unchanged lines omitted",
    "context line 8",
    "return old_value if old_value.ok else None",
]
must_not_contain = ["raise ValueError", "context line 2", "context line 5"]

[[filter.tests]]
description = "QB-055 regression: rename metadata never collapsed by the token-cost gate"
input = "diff --git a/src/notifications/legacy_channels.py b/src/notifications/channels.py\nsimilarity index 61%\nrename from src/notifications/legacy_channels.py\nrename to src/notifications/channels.py\nindex 2d3e4f5..6a7b8c9 100644\n--- a/src/notifications/legacy_channels.py\n+++ b/src/notifications/channels.py\n@@ -1,3 +1,3 @@\n class EmailChannel:\n-    def send_legacy(self, event):\n+    def send(self, event):"
must_contain = [
    "similarity index 61%",
    "rename from src/notifications/legacy_channels.py",
    "rename to src/notifications/channels.py",
]
must_not_contain = ["unchanged lines omitted"]
