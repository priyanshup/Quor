    "at com.example.app.Formatter.render(Formatter.java:22)",
    "at com.example.app.Main.process(Main.java:15)",
    "at com.example.app.Main.main(Main.java:8)",
]
must_not_contain = ["(×"]

[[filter.tests]]
description = "IllegalStateException thrown through a CGLIB/Spring AOP proxy chain: proxy frames collapse, user's service frame and the exception message survive"
input = "Exception in thread \"main\" java.lang.IllegalStateException: Order already shipped\n\tat com.example.orders.OrderService.ship(OrderService.java:44)\n\tat com.example.orders.OrderService$$EnhancerBySpringCGLIB$$1234.ship(<generated>)\n\tat org.springframework.cglib.proxy.MethodProxy.invoke(MethodProxy.java:218)\n\tat org.springframework.aop.framework.CglibAopProxy$CglibMethodInvocation.invokeJoinpoint(CglibAopProxy.java:793)\n\tat org.springframework.aop.framework.ReflectiveMethodInvocation.proceed(ReflectiveMethodInvocation.java:163)\n\tat com.example.orders.OrderController.shipOrder(OrderController.java:30)\n"
must_contain = [
    "java.lang.IllegalStateException: Order already shipped",
    "at com.example.orders.OrderService.ship(OrderService.java:44)",
    "at com.example.orders.OrderController.shipOrder(OrderController.java:30)",
    "at org.springframework.cglib.proxy.MethodProxy.invoke(MethodProxy.java:218) (×3)",
]
must_not_contain = [
    "at org.springframework.aop.framework.CglibAopProxy$CglibMethodInvocation.invokeJoinpoint(CglibAopProxy.java:793)",
    "at org.springframework.aop.framework.ReflectiveMethodInvocation.proceed(ReflectiveMethodInvocation.java:163)",
]

[[filter.tests]]
description = "Deep nested exception via reflection (JUnit invoking a test method through jdk.internal.reflect/java.base): the long reflection run collapses to one line, the exception type/message and the user's own test frame survive"
input = "java.lang.ArithmeticException: / by zero\n\tat com.example.calc.Calculator.divide(Calculator.java:12)\n\tat com.example.calc.CalculatorTest.testDivideByZero(CalculatorTest.java:19)\n\tat java.base/jdk.internal.reflect.NativeMethodAccessorImpl.invoke0(Native Method)\n\tat java.base/jdk.internal.reflect.NativeMethodAccessorImpl.invoke(NativeMethodAccessorImpl.java:77)\n\tat java.base/jdk.internal.reflect.DelegatingMethodAccessorImpl.invoke(DelegatingMethodAccessorImpl.java:43)\n\tat java.base/java.lang.reflect.Method.invoke(Method.java:568)\n\tat org.junit.platform.commons.util.ReflectionUtils.invokeMethod(ReflectionUtils.java:728)\n\tat org.junit.jupiter.engine.execution.MethodInvocation.proceed(MethodInvocation.java:60)\n\tat org.junit.jupiter.engine.execution.InvocationInterceptorChain$ValidatingInvocation.proceed(InvocationInterceptorChain.java:131)\n\tat org.junit.jupiter.engine.execution.ExecutableInvoker.invoke(ExecutableInvoker.java:115)\n\tat org.junit.platform.engine.support.hierarchical.NodeTestTask.execute(NodeTestTask.java:139)\n\tat org.junit.platform.engine.support.hierarchical.ForkJoinPoolHierarchicalTestExecutorService.invokeAll(ForkJoinPoolHierarchicalTestExecutorService.java:134)\n"
must_contain = [
    "java.lang.ArithmeticException: / by zero",
    "at com.example.calc.Calculator.divide(Calculator.java:12)",
    "at com.example.calc.CalculatorTest.testDivideByZero(CalculatorTest.java:19)",
    "at java.base/jdk.internal.reflect.NativeMethodAccessorImpl.invoke0(Native Method) (×10)",
]
must_not_contain = [
    "at org.junit.platform.engine.support.hierarchical.ForkJoinPoolHierarchicalTestExecutorService.invokeAll(ForkJoinPoolHierarchicalTestExecutorService.java:134)",
]

[[filter.tests]]
