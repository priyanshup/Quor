# quor built-in filter: Java stack traces (QB-056)
#
# Bare `java` invocations (java -jar app.jar, java -cp ... Main) previously
# fell through to the generic fallback (z_generic.toml — remove_ansi +
# framework-frame strip via the site-packages/dist-packages pattern, which
# never matches Java paths, + dedupe + a blind 1000-token max_tokens clamp).
# `java` was also not in `_KNOWN_BASE_COMMANDS`, so it was never even
# rewritten — a `java` process's stdout/stderr passed through Quor entirely
# untouched. Java stack traces routed through gradle/maven test-failure
# output (ci.toml) fare no better today: gradle.toml/maven.toml strip build
# noise but have no frame-aware handling, so a deep Spring Boot startup
# failure or nested `Caused by:` chain surfaces every single framework
# frame verbatim, often the majority of the token cost of the whole failure.
#
# This filter targets exactly that gap: collapse *repetitive, non-user*
# stack-frame noise (JDK internals, reflection, and common frameworks —
# Spring, JUnit, Gradle's test worker, Maven Surefire, Tomcat/Catalina,
# Hibernate, Netty, Jetty, Reactor, CGLIB proxies) while never touching the
# actual signal: the exception type, its message, the first frame of any
# collapsed run, every `Caused by:`/`Suppressed:` header and the exception
# it introduces, and the JVM's own `... N more` elision marker (the JVM
# already elides common trailing frames across a `Caused by:` boundary
# itself — that line represents compression the JVM performed, not noise to
# remove).
#
# Composed entirely from existing stage types (remove_ansi, group_repeated,
# strip_lines, deduplicate_consecutive, max_tokens) — no new stage, no
# registry/dispatcher/Pipeline/Engine/ContentMask/StageHandler change.
# Requires "java" to be a known base command (quor/rewrite/rules.py) for its
# output to ever be routed through Quor at all.
#
# group_repeated's shape-based default (exact_match=false, scope="run") is
# exactly what's needed here: a run of consecutive `\tat <framework-pkg>...`
# lines is noise regardless of which specific method each frame names, the
# same reasoning mypy's error-message collapsing (build.toml) and npm's
# deprecation-warning collapsing (node.toml) already rely on. The trigger
# pattern is a single alternation of well-known non-user package prefixes —
# it can never match `at com.<company>...`-style application frames, so a
# user's own call chain always survives completely, every frame, in its
# original order. min_count=3 (not 2, like mypy's own shape-based
# threshold in build.toml) — collapsing a run of only 2 framework frames
# saves little and these frames are genuinely never identical text, so a
# slightly higher bar avoids being overeager on short, still-scannable runs.
schema_version = 1

[[filter]]
name = "java"
match_command = '^java(?=\s|$)'
abort_unless = ["Exception in thread", "Caused by:", "\tat ", "        at "]
on_empty = "java: no output."

[[filter.stages]]
type = "remove_ansi"

[[filter.stages]]
type = "group_repeated"
# preserve_patterns here run before run-detection (see the stage's own
# docstring) so every exception header, Caused-by/Suppressed introduction,
# and the JVM's own elision marker is PROTECTed before any collapsing pass
# ever looks at the line stream. None of these ever start with optional
# whitespace + "at " (frame lines always do), so they could never
# accidentally satisfy `patterns` below regardless — this list is
# deliberate defense-in-depth documentation, not a functional necessity
# against the current pattern.
preserve_patterns = [
    '^Exception in thread\b',
    '^Caused by:',
    '^\s*Suppressed:',
    '^\s*\.\.\.\s*\d+\s*more\b',
    # QB-061: a bare exception header (no "Exception in thread" JVM wrapper —
    # the shape any manually-printed trace uses, e.g. Surefire/JUnit calling
    # Throwable.printStackTrace() directly, as opposed to an actually-uncaught
    # exception on the main thread) had no preserve_pattern anywhere in this
    # file: not here, not in the strip_lines stage below (which has none at
    # all), not in max_tokens below (which also has none) — so on a trace
    # long enough for max_tokens's tail-strategy budget to run out before
    # reaching the top, the exception's own type and message (the single
    # most important line in the whole trace) could be silently dropped
    # while every "Caused by:" header downstream survived. PROTECT set here
    # is permanent for the rest of the pipeline (engine.py's own guarantee),
    # so adding this pattern at this first opportunity is sufficient —
    # neither strip_lines nor max_tokens below need their own copy.
    # Verified via tests/java/004's real "java.lang.ArithmeticException: /
    # by zero" bare-header sample plus a synthetic 40-level Caused-by chain
    # exceeding the 600-token budget. Matches a dotted FQCN (optionally with
    # an inner-class "$" segment) whose last segment ends in "Exception" or
    # "Error" per universal Java naming convention, immediately followed by
    # ": " — the exact shape every bare/prefixed header in this file's own
    # samples and inline tests already uses. Never matches a frame line
    # (starts with whitespace + "at "), a "... N more"/"Caused by:"/
    # "Suppressed:" line (already handled above, and none of those start
    # with a bare identifier followed directly by ": "), or ordinary log
    # text (verified against every non-matching line in samples/java/*.txt
    # and this file's own test fixtures below).
    '^[\w$]+(?:\.[\w$]+)*(?:Exception|Error): ',
]
patterns = [
    '^\s*at (java\.base/|javax\.|jdk\.internal\.|sun\.reflect\.|sun\.rmi\.|com\.sun\.proxy\.|org\.springframework\.|org\.junit\.|org\.gradle\.|worker\.org\.gradle\.|org\.apache\.maven\.|org\.apache\.catalina\.|org\.apache\.tomcat\.|org\.hibernate\.|org\.eclipse\.jetty\.|io\.netty\.|reactor\.|net\.sf\.cglib\.|org\.springframework\.cglib\.)',
]
min_count = 3

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*$',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 600
strategy = "tail"

[[filter.tests]]
description = "Spring Boot Tomcat port-conflict startup failure: framework/JDK frames across both the top-level exception and its two Caused-by levels collapse; both Caused-by headers, both root exception messages, and the JVM's own \"... N more\" markers all survive"
input = "Exception in thread \"main\" org.springframework.context.ApplicationContextException: Unable to start web server\n\tat org.springframework.boot.web.embedded.tomcat.TomcatWebServer.initialize(TomcatWebServer.java:120)\n\tat org.springframework.boot.web.embedded.tomcat.TomcatServletWebServerFactory.getWebServer(TomcatServletWebServerFactory.java:198)\n\tat org.springframework.boot.web.servlet.context.ServletWebServerApplicationContext.createWebServer(ServletWebServerApplicationContext.java:184)\n\tat org.springframework.boot.SpringApplication.run(SpringApplication.java:315)\n\tat com.example.demo.DemoApplication.main(DemoApplication.java:10)\nCaused by: org.springframework.boot.web.server.WebServerException: Unable to start embedded Tomcat\n\tat org.springframework.boot.web.embedded.tomcat.TomcatWebServer.initialize(TomcatWebServer.java:117)\n\tat org.springframework.boot.web.embedded.tomcat.TomcatWebServer.<init>(TomcatWebServer.java:98)\n\t... 8 more\nCaused by: java.net.BindException: Address already in use\n\tat java.base/sun.nio.ch.Net.bind0(Native Method)\n\tat java.base/sun.nio.ch.Net.bind(Net.java:565)\n\tat java.base/sun.nio.ch.Net.bind(Net.java:554)\n\tat java.base/sun.nio.ch.ServerSocketChannelImpl.bind(ServerSocketChannelImpl.java:227)\n\tat org.apache.catalina.core.StandardServer.await(StandardServer.java:640)\n\t... 15 more\n"
must_contain = [
    "Exception in thread \"main\" org.springframework.context.ApplicationContextException: Unable to start web server",
    "com.example.demo.DemoApplication.main(DemoApplication.java:10)",
    "Caused by: org.springframework.boot.web.server.WebServerException: Unable to start embedded Tomcat",
    "... 8 more",
    "Caused by: java.net.BindException: Address already in use",
    "... 15 more",
    "(×",
]
must_not_contain = [
    "at org.springframework.boot.web.embedded.tomcat.TomcatServletWebServerFactory.getWebServer(TomcatServletWebServerFactory.java:198)",
    "at java.base/sun.nio.ch.Net.bind(Net.java:554)",
]

[[filter.tests]]
