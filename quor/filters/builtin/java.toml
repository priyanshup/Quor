must_contain = [
    "com.example.payments.PaymentProcessingException: Payment failed for order 4471",
    "at com.example.payments.PaymentService.process(PaymentService.java:51)",
    "at com.example.payments.PaymentController.charge(PaymentController.java:28)",
    "Caused by: org.springframework.web.client.HttpServerErrorException$InternalServerError: 500 Internal Server Error",
    "... 4 more",
    "Caused by: java.net.SocketTimeoutException: Read timed out",
    "... 9 more",
    "Caused by: java.io.IOException: Connection reset by peer",
    "... 12 more",
]
must_not_contain = [
    "at org.springframework.web.client.DefaultResponseErrorHandler.handleError(DefaultResponseErrorHandler.java:184)",
    "at java.base/java.net.SocketInputStream.socketRead(SocketInputStream.java:115)",
    "at java.base/sun.nio.ch.SocketDispatcher.read(SocketDispatcher.java:47)",
]

