# quor built-in filter: pytest
# Strips passing-test noise; preserves failures, errors, and tracebacks.
schema_version = 1

[[filter]]
name = "pytest"
match_command = '^pytest\b|^python -m pytest\b'
abort_unless = ["FAILED", "ERROR", "error"]
on_empty = "All tests passed."

[[filter.stages]]
type = "group_repeated"
# QB-044 slice 1+2: collapse repeated "short test summary info" FAILED lines
# that share the exact same failure message at a different test location —
# e.g. the same assertion failing across several parametrized cases. Must
# run before strip_lines below: strip_lines's own preserve_patterns PROTECTs
# every "FAILED" line, and group_repeated never touches PROTECT lines (same
# ordering QB-014 already established for mypy/npm in build.toml/node.toml).
# The trigger pattern only matches pytest's "FAILED <nodeid> - <message>"
# summary-line shape (requires the " - " separator), so it never touches the
# earlier, message-less "FAILED <nodeid>" lines interleaved with PASSED —
# those have no message to compare, so grouping them would only ever lose
# information about which tests failed, never save anything meaningful.
patterns = ['^FAILED\s+\S+\s+-\s+']
# location_pattern captures just the nodeid (file::test[params]) between
# "FAILED " and " - " — the only thing excluded from the comparison key.
# Everything after " - " (the actual failure message) is compared verbatim
# and never rewritten.
location_pattern = '^FAILED\s+(\S+)\s+-\s+'
min_count = 2
# QB-044 slice 2: real parametrized-test failures are almost never adjacent
# in pytest's "short test summary info" block — other tests' FAILED lines
# sit between repeats of the same root-cause message. scope="global" scans
# the whole line stream instead of only consecutive lines, using the same
# byte-identical-after-location-removal comparison as slice 1 — still no
# shape matching, no fuzzy comparison, just no longer adjacency-restricted.
scope = "global"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^[.sFPE]+$',
    '^PASSED ',
    '^test_.*PASSED$',
    '^\s*\d+ passed',
    '^platform ',
    '^rootdir:',
    '^plugins:',
    '^collecting\s',
    '=+ test session starts =+',
    '=+ short test summary info =+',
    '^cachedir:',
    # Stack trace frame dedup: a failing test's traceback through Django/
    # Flask/pytest's own internals is often 90% framework frames the user
    # never needs to see (docs/archive/product-discovery/competitive-research.md
    # Opportunity 6). Only the frame header line is stripped — its indented
    # source-code line is a separate line with no distinguishing marker of
    # its own, so it's left as-is rather than risk dropping real content
    # (Safety Rule #3: when uncertain, keep it). site-packages/dist-packages
    # unambiguously means third-party/installed code, never the user's own
    # project, on every platform — bare stdlib paths are deliberately not
    # matched here (Windows' stdlib path has no equivalently unambiguous
    # marker, e.g. a user folder literally named "lib" would false-positive).
    '(?i)^\s*File "[^"]*(?:site-packages|dist-packages)[^"]*", line \d+, in',
    # QB-060: the pattern above only matches Python's *classic* traceback
    # shape ("File "x", line N, in func"), which is `--tb=native`-only.
    # pytest's actual *default* traceback renderer (verified: real pytest
    # 9.1.1 output, no config overrides) never prints that shape at all —
    # it uses its own "<path>:<line>: in <func>" frame header instead (no
    # "File" keyword, no comma before "line"). Both a stdlib call chain and
    # a site-packages dependency's internals go through the same renderer,
    # but only the site-packages-anchored frames are stripped here, for the
    # same reason bare stdlib paths are excluded above: pytest shows these
    # paths *relative to rootdir*, so a stdlib frame reached via several
    # ".." segments has no equivalently unambiguous marker to gate on
    # cross-platform, while "site-packages"/"dist-packages" in the path is
    # unambiguous everywhere.
    '^\S*(?:site-packages|dist-packages)\S*:\d+: in \S+$',
    # QB-060: pytest's own fixed boilerplate URL, always appended verbatim
    # under "warnings summary" whenever any warning was captured
    # (_pytest/terminal.py's literal "-- Docs: https://docs.pytest.org/..."
    # string) — carries no information beyond the URL itself, same category
    # as npm's funding/audit nag stripping (QB-052, node.toml).
    '^-- Docs: https://docs\.pytest\.org/',
]
preserve_patterns = [
    'FAILED',
    'ERROR',
    'Error',
    'Exception',
    'assert',
    'AssertionError',
    'Traceback',
]

[[filter.stages]]
type = "deduplicate_consecutive"

[[filter.stages]]
type = "max_tokens"
limit = 500
strategy = "tail"

[[filter.tests]]
description = "PASSED lines stripped, FAILED preserved"
input = "PASSED tests/test_foo.py::test_a\nFAILED tests/test_foo.py::test_b\n    AssertionError: expected True"
must_contain = ["FAILED", "AssertionError"]
must_not_contain = ["PASSED tests/test_foo"]

[[filter.tests]]
description = "abort_unless: all-pass output returned unchanged"
input = "PASSED tests/test_a.py::test_x\nPASSED tests/test_a.py::test_y\n2 passed in 0.1s"
must_contain = ["PASSED"]

[[filter.tests]]
description = "Session header and collection lines stripped on failure run"
input = "===== test session starts =====\ncollecting ...\nFAILED tests/test_b.py::test_z\nERROR: something went wrong"
must_contain = ["FAILED", "ERROR"]
must_not_contain = ["collecting ..."]

[[filter.tests]]
description = "Framework traceback frames stripped; user frame and exception preserved"
input = "FAILED tests/test_views.py::test_index\nTraceback (most recent call last):\n  File \"/home/user/myproject/views.py\", line 10, in index\n    return render(request)\n  File \"/usr/lib/python3.11/site-packages/django/core/handlers/base.py\", line 55, in _get_response\n    response = wrapped_callback(request)\nZeroDivisionError: division by zero"
must_contain = ["FAILED", "Traceback", "views.py\", line 10, in index", "ZeroDivisionError"]
must_not_contain = ["site-packages/django"]

[[filter.tests]]
description = "QB-044: repeated parametrized failures with the same message at different locations collapse; first kept verbatim, repeats replaced by a location summary"
input = "FAILED tests/test_math.py::test_add[1-2] - AssertionError: Values must be positive\nFAILED tests/test_math.py::test_add[3-4] - AssertionError: Values must be positive\nFAILED tests/test_math.py::test_add[5-6] - AssertionError: Values must be positive\n3 failed in 0.5s\n"
must_contain = [
    "FAILED tests/test_math.py::test_add[1-2] - AssertionError: Values must be positive",
    "2 more with the same message at:",
    "test_add[3-4]",
    "test_add[5-6]",
]
must_not_contain = [
    "FAILED tests/test_math.py::test_add[3-4] - AssertionError: Values must be positive",
    "FAILED tests/test_math.py::test_add[5-6] - AssertionError: Values must be positive",
]

[[filter.tests]]
description = "QB-044 safety: FAILED summary lines with genuinely different messages are never merged, even at the same trigger shape"
input = "FAILED tests/test_auth.py::test_logout - AssertionError: assert False is True\nFAILED tests/test_payment.py::test_charge_duplicate - Failed: DID NOT RAISE <class 'src.payments.errors.DuplicateChargeError'>\n2 failed in 0.4s\n"
must_contain = [
    "FAILED tests/test_auth.py::test_logout - AssertionError: assert False is True",
    "FAILED tests/test_payment.py::test_charge_duplicate - Failed: DID NOT RAISE <class 'src.payments.errors.DuplicateChargeError'>",
]
must_not_contain = ["more with the same message"]

[[filter.tests]]
description = "QB-044 slice 2: non-adjacent repeats of the same message collapse across an unrelated failure in between (global scope); the unrelated line keeps its own position and text, and the first occurrence is kept verbatim"
input = "FAILED tests/test_math.py::test_add[1] - AssertionError: Values must be positive\nFAILED tests/test_other.py::test_unrelated - AssertionError: Something else entirely\nFAILED tests/test_math.py::test_add[2] - AssertionError: Values must be positive\n3 failed in 0.6s\n"
must_contain = [
    "FAILED tests/test_math.py::test_add[1] - AssertionError: Values must be positive",
    "1 more with the same message at:",
    "test_add[2]",
    "FAILED tests/test_other.py::test_unrelated - AssertionError: Something else entirely",
]
must_not_contain = [
    "FAILED tests/test_math.py::test_add[2] - AssertionError: Values must be positive",
]

[[filter.tests]]
description = "QB-044 slice 2 safety: two singleton messages scattered around a repeated one keep their own normalized keys and are never merged into its group"
input = "FAILED tests/test_math.py::test_add[1] - AssertionError: Values must be positive\nFAILED tests/test_math.py::test_sub[1] - AssertionError: Values must be negative\nFAILED tests/test_math.py::test_mul[1] - AssertionError: Cannot multiply by zero\nFAILED tests/test_math.py::test_add[2] - AssertionError: Values must be positive\n4 failed in 0.7s\n"
must_contain = [
    "FAILED tests/test_math.py::test_add[1] - AssertionError: Values must be positive",
    "1 more with the same message at:",
    "test_add[2]",
    "FAILED tests/test_math.py::test_sub[1] - AssertionError: Values must be negative",
    "FAILED tests/test_math.py::test_mul[1] - AssertionError: Cannot multiply by zero",
]
must_not_contain = [
    "FAILED tests/test_math.py::test_add[2] - AssertionError: Values must be positive",
]

[[filter.tests]]
description = "QB-060: pytest's actual default-shape site-packages frame headers ('<path>:<line>: in <func>', no 'File' keyword) are stripped; the raise-site frame, exception, and message survive"
input = "FAILED tests/test_lib.py::test_bad_call\n\n    def test_bad_call():\n>       requests.get(\"not-a-valid-url\")\n\ntest_lib.py:4: \n_ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _\n..\\..\\..\\Python314\\Lib\\site-packages\\requests\\api.py:87: in get\n    return request(\"get\", url, params=params, **kwargs)\n..\\..\\..\\Python314\\Lib\\site-packages\\requests\\sessions.py:635: in request\n    prep = self.prepare_request(req)\n\nself = <PreparedRequest [GET]>, url = 'not-a-valid-url'\n\n>           raise MissingSchema(\nE           requests.exceptions.MissingSchema: Invalid URL 'not-a-valid-url': No scheme supplied.\n\n..\\..\\..\\Python314\\Lib\\site-packages\\requests\\models.py:514: MissingSchema\nFAILED tests/test_lib.py::test_bad_call - requests.exceptions.MissingSchema: Invalid URL\n"
must_contain = [
    "return request(\"get\", url, params=params, **kwargs)",
    "prep = self.prepare_request(req)",
    "raise MissingSchema(",
    "E           requests.exceptions.MissingSchema: Invalid URL 'not-a-valid-url': No scheme supplied.",
]
must_not_contain = [
    "site-packages\\requests\\api.py:87: in get",
    "site-packages\\requests\\sessions.py:635: in request",
]

[[filter.tests]]
description = "QB-060: classic 'File \"x\", line N, in func' shape (--tb=native) is still handled by the original pattern, unaffected by the new default-shape pattern"
input = "FAILED tests/test_views.py::test_checkout_view\n\nTraceback (most recent call last):\n  File \"/workspace/app/tests/test_views.py\", line 22, in test_checkout_view\n    response = client.get(\"/checkout/\")\n  File \"/usr/lib/python3.11/site-packages/django/test/client.py\", line 815, in get\n    response = super().get(path, data=data)\n  File \"/workspace/app/views.py\", line 48, in checkout_view\n    cart = request.session[\"cart\"]\nKeyError: 'cart'\n"
must_contain = [
    "response = client.get(\"/checkout/\")",
    "File \"/workspace/app/views.py\", line 48, in checkout_view",
    "KeyError: 'cart'",
]
must_not_contain = [
    "File \"/usr/lib/python3.11/site-packages/django/test/client.py\", line 815, in get",
]

[[filter.tests]]
description = "QB-060: warnings-summary Docs URL boilerplate stripped; the warning itself and the failure summary survive"
input = "================================== FAILURES ===================================\ntest_sample.py::test_fail_param[1] FAILED\n\n============================== warnings summary ===============================\ntest_sample.py::test_fail_param[1]\n  /project/test_sample.py:12: DeprecationWarning: this is deprecated\n    warnings.warn(\"this is deprecated\", DeprecationWarning)\n\n-- Docs: https://docs.pytest.org/en/stable/how-to/capture-warnings.html\nFAILED test_sample.py::test_fail_param[1] - assert 1 == 999\n"
must_contain = [
    "DeprecationWarning: this is deprecated",
    "FAILED test_sample.py::test_fail_param[1] - assert 1 == 999",
]
must_not_contain = ["docs.pytest.org"]
