# quor built-in filter: cat (YAML files) — QB-040 structural extraction
#
# Collapses long, homogeneous YAML sequences (a Kubernetes manifest's
# repeated container/env entries, a CI matrix's repeated job list) to their
# first few elements plus an omitted-count placeholder — every mapping key,
# every genuinely distinct value, and every kept element's original
# formatting survive byte-for-byte. See
# quor/pipeline/stages/structured_data_summarize.py's module docstring for
# why this needs its own stage, and quor/pipeline/structured_data/yaml_fmt.py
# for how position tracking works without a hand-rolled YAML parser.
#
# Must be loaded before the generic `cat.toml` filter so `.yaml`/`.yml`
# files match here first — "cat-yaml.toml" sorts before "cat.toml"
# lexicographically, the same convention cat-python.toml established.
#
# Unlike cat-json.toml, YAML genuinely has `#` comments — strip_lines still
# does real, needed work here, reusing cat.toml's own comment/blank-line
# patterns and preserve_patterns verbatim (same rationale: a `#`-prefixed
# YAML comment is exactly as disposable as a shell comment once the
# structural pass has already run). No deduplicate_consecutive, for the same
# reason cat-json.toml omits it: two different mapping keys can legitimately
# render identical consecutive lines, which is not repetition.
#
# structured_data_summarize runs FIRST, before strip_lines: it needs the
# original comment lines still present to compute correct line positions
# from `yaml.compose()` (a comment stripped first would shift every
# subsequent line number out of alignment with the parsed node marks).
#
# quor[yaml] (PyYAML) is an optional dependency — if it is not installed,
# structured_data_summarize fails open (mask unchanged, see that stage's
# module docstring), and this filter still strips comments/blank lines as
# before, exactly like `quor[javascript]` missing degrades cat-javascript.toml
# to "no body compression, everything else unchanged" rather than failing.
schema_version = 1

[[filter]]
name = "cat-yaml"
match_command = '^cat\s+(-\S+\s+)*\S*\.ya?ml\b'
on_empty = "(empty document)"

[[filter.stages]]
type = "structured_data_summarize"
format = "yaml"

[[filter.stages]]
type = "strip_lines"
patterns = [
    '^\s*#[^!]',
]
preserve_patterns = [
    '^#!/',
    'TODO',
    'FIXME',
    'HACK',
    'XXX',
    'NOTE',
    'WARN',
]

[[filter.stages]]
type = "max_tokens"
limit = 2000
strategy = "both"

[[filter.tests]]
description = "Short YAML document passes through unchanged"
input = "name: quor\nversion: 0.4.1\n"
must_contain = ["name: quor", "version: 0.4.1"]

[[filter.tests]]
description = "Long homogeneous sequence collapsed; keys and first entries preserved"
input = "dependencies:\n  - name: a\n    version: 1.0.0\n  - name: b\n    version: 1.0.1\n  - name: c\n    version: 1.0.2\n  - name: d\n    version: 1.0.3\n  - name: e\n    version: 1.0.4\n  - name: f\n    version: 1.0.5\n  - name: g\n    version: 1.0.6\n"
must_contain = ["name: a", "name: b", "name: c", "more items omitted"]
must_not_contain = ["name: d"]
requires_format = "yaml"

[[filter.tests]]
description = "Regular comments stripped; TODO/NOTE preserved"
input = "# regular comment\n# TODO: revisit this\nname: quor\n"
must_contain = ["TODO: revisit this", "name: quor"]
must_not_contain = ["# regular comment"]

[[filter.tests]]
description = "Invalid YAML fails open -- original content returned unchanged"
input = "key: [unterminated\n"
must_contain = ["key: [unterminated"]
