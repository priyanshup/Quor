name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: actions/checkout@v4
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check quor/
      - name: Type check
        run: mypy quor/
      - name: Run unit tests
        run: pytest tests/unit -q
      - name: Run integration tests
        run: pytest tests/integration -q -m integration
      - name: Run benchmark regression suite
        run: python -m tests.benchmarks.run_benchmarks
      - name: Upload coverage
        run: codecov
      - name: Notify on failure
        run: echo "CI failed" >> $GITHUB_STEP_SUMMARY
