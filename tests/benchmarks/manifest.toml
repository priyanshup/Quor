# ---------------------------------------------------------------------------
# QB-007B: Markdown / plain-text document filters. `command` here is not a
# shell command — it is a bare file path string, matched by FilterRegistry
# exactly as any other `command` value (see markdown.toml/document-text.toml
# header comments and backlog.md's QB-007B entry for why file-path routing
# reuses this same field). As of QB-007E4, these filters (and the DOCX/PDF
# extraction cases below) are wired into the live PostToolUse/Read hook —
# this benchmark coverage validates the same filter layer FilterRegistry.
# apply() exercises in production, not an isolated approximation of it.
# ---------------------------------------------------------------------------

[[case]]
id = "markdown-design-doc-long"
category = "markdown"
ecosystem = "Documents"
