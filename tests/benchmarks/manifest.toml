# ---------------------------------------------------------------------------
# QB-007E4: DOCX/PDF, via extraction (quor/pipeline/extract) then the same
# "markdown" filter the .md cases above use — no docx.toml/pdf.toml exists.
# `command` is a representative file path for display purposes only; unlike
# every case above, it is NOT used for routing here — benchmark_runner.py's
# run_case() looks the filter up by name (expected_filter) for these two
# extensions, mirroring quor/adapters/claude_read.py's own DOCX/PDF branch,
# since a real .docx/.pdf command string would never match markdown.toml's
# file-path pattern. original_tokens/compression_pct for these cases measure
# extracted-text -> filtered-text, not raw Read tool_response -> filtered
# text — what a real tool_response contains for a binary file remains
# unconfirmed (see backlog.md's QB-007A/E1 "Limitations" entries), so this
# is the most honest figure available to benchmark against.
# ---------------------------------------------------------------------------

[[case]]
