# Quor compression benchmark manifest (QB-011).
#
# Each [[case]] is one benchmark sample: a command string (used only to pick
# a filter via FilterRegistry.find(), exactly like real dispatch), a sample
# file containing pre-captured command output, and correctness/floor checks.
#
# This manifest is the ONLY place filter-specific knowledge lives. The
# runner (benchmark_runner.py) and reports (report.py) treat `category` and
# `ecosystem` as arbitrary, opaque strings — they group and report on
# whatever values appear here without any hardcoded list of filters or
# ecosystems. Adding support for a brand-new filter (npm, Docker, PDF,
# DOCX, Terraform, ...) never requires touching benchmark_runner.py or
# report.py: add a sample file and a [[case]] entry, done.
#
# Fields:
#   id                 — stable identifier, used to match cases against a
#                        saved baseline across runs (renaming an id starts
#                        it fresh with no baseline history).
#   category           — groups cases in the per-filter report; one per
#                        required command family (git-diff, git-log,
#                        git-status, pytest, mypy, generic).
#   ecosystem          — a coarser grouping than category, for the
#                        per-ecosystem report (e.g. "Git", "Python",
#                        "Generic"). Multiple categories can share one
#                        ecosystem (git-status/git-log/git-diff -> "Git").
#   command            — a real, representative command string. Matched
#                        against the built-in FilterRegistry the same way
#                        the dispatcher matches a real invocation.
#   sample_file        — path relative to tests/benchmarks/.
#   expected_filter    — the filter name FilterRegistry.find() must return
#                        for this command. A mismatch is a correctness
#                        failure (e.g. a routing regression), independent
#                        of compression ratio.
#   min_reduction_pct  — a loose, absolute floor (not the primary
#                        regression signal — that's baseline comparison).
#                        Catches a catastrophic break (e.g. a stage
#                        silently no-oping) even before a baseline exists.
#   must_contain       — substrings that must survive in the rendered
#                        output. A violation is a correctness failure,
#                        reported separately from compression metrics,
#                        following the must_contain convention already used
#                        by every built-in filter's own inline tests.

[[case]]
id = "git-status-modified-untracked"
category = "git-status"
ecosystem = "Git"
command = "git status"
sample_file = "samples/git-status/001_modified_and_untracked.txt"
expected_filter = "git-status"
min_reduction_pct = 15.0
must_contain = ["modified:   src/payments/processor.py", "new file:   src/payments/retry.py"]

