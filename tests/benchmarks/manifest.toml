[[case]]
id = "java-bare-header-deep-recursion"
category = "java"
ecosystem = "Java"
# QB-061: a bare exception header (no "Exception in thread" JVM wrapper —
# the shape a manually-printed trace uses, since that wrapper is only ever
# emitted by the JVM's own uncaught-exception handler on the thread that
# actually died) followed by a deep, non-fungible recursion stack long
# enough to exceed max_tokens's tail budget on its own. Regression coverage
# for the finding that this header previously had no preserve_pattern
# anywhere in java.toml's pipeline and could be silently dropped.
command = "java -cp target/classes com.example.orders.BatchValidationRunner"
sample_file = "samples/java/006_bare_header_deep_recursion.txt"
expected_filter = "java"
min_reduction_pct = 25.0
must_contain = [
    "com.example.orders.OrderValidationException: order graph exceeds maximum nesting depth (500)",
    "at com.example.orders.OrderGraphValidator.validate(OrderGraphValidator.java:30)",
    "at com.example.orders.BatchValidationRunner.main(BatchValidationRunner.java:14)",
]

