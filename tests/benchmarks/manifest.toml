[[case]]
id = "npx-prettier-check-failure"
# QB-006C: prettier now has its own dedicated filter (node.toml), so
# `npx prettier ...` routes there instead of the generic `npx` filter —
# category/expected_filter updated accordingly. Known limitation: the
# prettier filter doesn't strip npx's own auto-install preamble line ("npm
# warn exec ..." on this sample's first line) — the same documented gap the
# eslint filter already has for the same reason: once routed past the
# wrapper, that generic wrapper-noise concern is intentionally out of scope
# for the tool-specific filter. min_reduction_pct lowered to reflect this.
category = "prettier"
ecosystem = "JavaScript"
command = "npx prettier --check ."
sample_file = "samples/npx/002_prettier_check_failure.txt"
expected_filter = "prettier"
min_reduction_pct = 5.0
must_contain = ["Code style issues found in 2 files", "src/components/Cart.jsx"]

